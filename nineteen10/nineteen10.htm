<script>
  /**
   * Copia il codice della stanza negli appunti
   */
  function copyRoomCode() {
    const roomIdInput = document.getElementById('room-id');
    if (!roomIdInput.value) {
      alert('Genera prima un codice stanza unendoti al gioco!');
      return;
    }
    
    navigator.clipboard.writeText(roomIdInput.value).then(() => {
      alert('✅ Codice copiato: ' + roomIdInput.value);
    }).catch(() => {
      // Fallback per browser vecchi
      roomIdInput.select();
      document.execCommand('copy');
      alert('✅ Codice copiato: ' + roomIdInput.value);
    });
  }

  /**
   * Funzione di setup del gioco - sostituisce init() durante il multiplayer
   */
  function handleJoinGame() {
    const playerName = document.getElementById('player-name').value.trim();
    const roomId = document.getElementById('room-id').value.trim();
    
    if (!playerName) {
      alert('Inserisci il tuo nome!');
      return;
    }
    
    // Se specificato un roomId, salvalo globalmente
    if (roomId) {
      currentRoomId = roomId;
    }
    
    // Chiama la funzione del socket-handler
    joinGame(playerName);
    
    // Nascondi il pannello di join
    document.getElementById('game-setup-panel').style.display = 'none';
    document.getElementById('game-board').style.display = 'block';
    
    // Chiama init() se il gioco è single-player (fallback)
    if (typeof init === 'function') {
      init();
    }
  }
  
  /**
   * Override della funzione estrai() originale per il multiplayer
   */
  const originalEstrai = window.estrai;
  window.estrai = function() {
    if (isConnected && currentPlayerId) {
      // Modalità multiplayer
      drawCard();
    } else if (originalEstrai) {
      // Fallback a single-player
      originalEstrai();
    }
  };
  
  /**
   * Override della funzione sostituzione() originale per il multiplayer
   */
  const originalSostituzione = window.sostituzione;
  window.sostituzione = function(position) {
    if (isConnected && currentPlayerId) {
      // Modalità multiplayer - leggi la carta dalla mano locale
      const card = window.myHand ? window.myHand[position - 1] : null;
      if (card) {
        substituteCard(position - 1, card);
      }
    } else if (originalSostituzione) {
      // Fallback a single-player
      originalSostituzione(position);
    }
  };
</script>
