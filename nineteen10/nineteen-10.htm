<script>    
function isMobile() {     
     return /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
   }  
function isLandscape() {
    return window.innerWidth > window.innerHeight;
}  
function ricarica() {    
    if(isMobile()) {
      if (isLandscape()){	                             
        alert("Ruotare il dispositivo in posizione verticale, la partita ricomincia!"); 
        window.addEventListener('resize', function(){
          if(!isLandscape()){ 
            alert("Non ruotare in orizzontale il dispositivo per poter completare la partita");
            location.reload(true);                        
          }
          else 
            alert("Ruotare il dispositivo in posizione verticale, la partita ricomincia!");
          //location.reload(true);                      
        });}
           /*else {	       
                  alert("Non ruotare in orizzontale il dispositivo per poter completare la partita");          
              } */
      }                             
  } 
  
ricarica();
</script>

<script>  
function isTablet() {   
    const userAgent = navigator.userAgent.toLowerCase();    
    const isTabletUserAgent = /ipad|android.*tablet|tablet|kindle|playbook|silk/.test(userAgent);
    const isTabletByScreenSize = (window.innerWidth >= 600 && window.innerWidth <= 1200) && /mobi|android|iphone/.test(userAgent);
    return isTabletUserAgent || isTabletByScreenSize;  
}    
if (isTablet()) {   
    let viewport = document.querySelector("meta[name=viewport]");
    viewport.content = "width=device-width, initial-scale=1.0";   
}  
</script>
